<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8E3B46"/>
      <stop offset="100%" stop-color="#561C24"/>
    </linearGradient>
    <linearGradient id="glowGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D8C4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E8D8C4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="quillGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#C7B7A3"/>
      <stop offset="100%" stop-color="#FDFBF7"/>
    </linearGradient>
    <filter id="softShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#250A0E" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="url(#bgGrad2)"/>
  <circle cx="40" cy="40" r="38" fill="url(#glowGrad2)"/>
  <circle cx="40" cy="40" r="36" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none"/>

  <!-- Clipboard / Registration form -->
  <g filter="url(#softShadow2)">
    <!-- Clipboard body -->
    <rect x="20" y="23" width="34" height="38" rx="3" fill="#F5EFE6" opacity="0.95"/>
    <!-- Clip at top -->
    <rect x="30" y="19" width="14" height="8" rx="3" fill="#C7B7A3"/>
    <rect x="32" y="21" width="10" height="4" rx="2" fill="#9A8A8D" opacity="0.5"/>

    <!-- Form lines -->
    <line x1="26" y1="34" x2="48" y2="34" stroke="#C7B7A3" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="26" y1="40" x2="48" y2="40" stroke="#C7B7A3" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="26" y1="46" x2="40" y2="46" stroke="#C7B7A3" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

    <!-- Checkbox items -->
    <rect x="26" y="51" width="5" height="5" rx="1.2" fill="none" stroke="#8E3B46" stroke-width="1.5"/>
    <polyline points="27,53.5 28.5,55 31,52" stroke="#8E3B46" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="33" y1="53.5" x2="42" y2="53.5" stroke="#C7B7A3" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Quill / pen writing -->
  <g transform="translate(42, 39) rotate(-35)" filter="url(#softShadow2)">
    <!-- Quill feather -->
    <path d="M2 0 Q10 -8 18 -18 Q12 -10 8 0 Z" fill="url(#quillGrad)" opacity="0.9"/>
    <path d="M2 0 Q6 -6 12 -14 Q8 -7 5 0 Z" fill="white" opacity="0.4"/>
    <!-- Quill shaft -->
    <line x1="2" y1="0" x2="18" y2="-18" stroke="#E3D1BB" stroke-width="0.8" opacity="0.5"/>
    <!-- Nib -->
    <path d="M2 0 L-1 4 L3 2 Z" fill="#561C24"/>
    <!-- Ink dot -->
    <circle cx="-0.5" cy="3" r="1.2" fill="#3A1016" opacity="0.8"/>
  </g>

  <!-- Small star accent -->
  <g transform="translate(57, 23)">
    <path d="M0,-5 L1.2,-1.5 L4.8,-1.5 L1.9,0.8 L3,4.5 L0,2.5 L-3,4.5 L-1.9,0.8 L-4.8,-1.5 L-1.2,-1.5 Z"
          fill="#E3D1BB" opacity="0.7" transform="scale(0.7)"/>
  </g>
</svg>
